<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <h1>Kanban Board</h1>
      <p class="subtitle">Compact board with multiple boards, recurring tasks, filters, and backup</p>
    </div>

    <div class="topbar-actions">
      <button id="toggleFormBtn" class="btn btn-secondary">Hide Form</button>
      <button id="exportBtn" class="btn btn-secondary">Export</button>
      <label class="btn btn-secondary import-label">
        Import
        <input id="importFile" type="file" accept=".json" hidden />
      </label>
      <button id="clearBoardBtn" class="btn btn-secondary">Clear Tasks</button>
    </div>
  </header>

  <main class="app-shell">
    <section class="panel board-switcher-panel">
      <div class="board-switcher">
        <div class="board-switcher-left">
          <label for="boardSelect">Board</label>
          <select id="boardSelect"></select>
        </div>

        <div class="board-switcher-actions">
          <button id="newBoardBtn" class="btn btn-secondary">New Board</button>
          <button id="renameBoardBtn" class="btn btn-secondary">Rename</button>
          <button id="deleteBoardBtn" class="btn btn-danger">Delete Board</button>
        </div>
      </div>
    </section>

    <section id="taskFormPanel" class="panel add-task-card">
      <div class="section-header compact-header">
        <h2 id="formTitle">Add Task</h2>
      </div>

      <div class="form-grid dense-form-grid">
        <div class="field title-field">
          <label for="taskTitle">Task</label>
          <input id="taskTitle" type="text" placeholder="Enter a task" />
        </div>

        <div class="field short-field">
          <label for="taskPriority">Priority</label>
          <select id="taskPriority">
            <option>High</option>
            <option selected>Medium</option>
            <option>Low</option>
          </select>
        </div>

        <div class="field short-field">
          <label for="taskDueDate">Due</label>
          <input id="taskDueDate" type="date" />
        </div>

        <div class="field short-field">
          <label for="taskStatus">Status</label>
          <select id="taskStatus">
            <option value="backlog" selected>Backlog</option>
            <option value="inprogress">In Progress</option>
            <option value="blocked">Blocked</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="field recurring-inline-field">
          <label>Recurring</label>
          <div class="recurring-inline-wrap">
            <label class="checkbox-inline tight-checkbox">
              <input id="taskRecurring" type="checkbox" />
              <span>Recurring</span>
            </label>

            <div id="recurrenceFields" class="recurrence-inline hidden">
              <select id="taskRecurrenceType">
                <option value="daily">Daily</option>
                <option value="weekly" selected>Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>

              <input id="taskRecurrenceInterval" type="number" min="1" value="1" />
            </div>
          </div>
        </div>

        <div class="field notes-field">
          <label for="taskNotes">Notes</label>
          <input id="taskNotes" type="text" placeholder="Optional notes" />
        </div>

        <div class="form-actions inline-actions">
          <button id="cancelEditBtn" class="btn btn-secondary hidden">Cancel Edit</button>
          <button id="saveTaskBtn" class="btn btn-primary">Add Task</button>
        </div>
      </div>
    </section>

    <section class="panel toolbar compact-toolbar">
      <div class="toolbar-left">
        <input id="searchInput" type="text" placeholder="Search tasks" />
      </div>

      <div class="toolbar-right">
        <select id="priorityFilter">
          <option value="all">All Priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </section>

    <section class="stats-row compact-stats">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open</div>
        <div class="stat-value" id="statOpen">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Blocked</div>
        <div class="stat-value" id="statBlocked">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Done</div>
        <div class="stat-value" id="statDone">0</div>
      </div>
    </section>

    <section class="board compact-board">
      <div class="column" data-status="backlog">
        <div class="column-header">
          <h3>Backlog</h3>
          <span class="count" id="count-backlog">0</span>
        </div>
        <div class="column-body" id="backlogColumn"></div>
      </div>

      <div class="column" data-status="inprogress">
        <div class="column-header">
          <h3>In Progress</h3>
          <span class="count" id="count-inprogress">0</span>
        </div>
        <div class="column-body" id="inprogressColumn"></div>
      </div>

      <div class="column" data-status="blocked">
        <div class="column-header">
          <h3>Blocked</h3>
          <span class="count" id="count-blocked">0</span>
        </div>
        <div class="column-body" id="blockedColumn"></div>
      </div>

      <div class="column" data-status="done">
        <div class="column-header">
          <h3>Done</h3>
          <span class="count" id="count-done">0</span>
        </div>
        <div class="column-body" id="doneColumn"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
