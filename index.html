<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steve's KanBan Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="topbar">
    <div class="topbar-left">
      <h1>Steve's KanBan Board</h1>
      <p class="subtitle" id="syncStatus">Shared kanban board with Supabase sync</p>
    </div>
    <div class="topbar-right">
      <a href="clip.html" class="btn btn-outline">Clip Board</a>
      <a href="badges.html" class="btn btn-outline">Badge Tracker</a>
      <button id="toggleFormBtn" class="btn btn-outline">Hide Form</button>
      <button id="signOutBtn" class="btn btn-outline">Sign Out</button>
    </div>
  </header>

  <!-- Board selector -->
  <div class="board-bar">
    <div class="board-tabs" id="boardTabs" role="tablist" aria-label="Board"></div>
    <div class="board-actions">
      <select id="priorityFilter" class="form-select">
        <option value="">All Priorities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <button id="accomplishmentsBtn" class="btn btn-outline" title="Compile flagged Done tasks into a status report">Accomplishments</button>
      <button id="newBoardBtn" class="btn btn-primary">New Board</button>
      <button id="renameBoardBtn" class="btn btn-outline">Rename</button>
      <button id="deleteBoardBtn" class="btn btn-danger-outline">Delete Board</button>
    </div>
  </div>

  <!-- Add Task form -->
  <div class="form-bar" id="formBar">
    <div class="form-bar-title">Add Task</div>
    <div class="form-row">
      <input id="taskTitle" type="text" placeholder="Enter a task" class="form-input flex-2" />
      <select id="taskPriority" class="form-select">
        <option>Critical</option>
        <option>High</option>
        <option selected>Medium</option>
        <option>Low</option>
      </select>
      <input id="taskDueDate" type="date" class="form-input" />
      <select id="taskStatus" class="form-select">
        <option value="todo">To Do</option>
        <option value="ondeck">On Deck</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
      </select>
      <select id="taskRecurring" class="form-select">
        <option value="">Not Recurring</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
      <input id="taskRecurringInterval" type="number" min="2" max="52" value="1" class="form-input" style="width:60px;display:none" title="Every N weeks/months" />
      <input id="taskNotes" type="text" placeholder="Optional notes" class="form-input flex-2" />
      <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
    </div>
  </div>


  <!-- Board columns -->
  <main class="board" id="board">
    <div class="column" data-status="todo">
      <div class="column-header">
        <span class="column-title">To Do</span>
        <span class="count" id="count-todo">0</span>
      </div>
      <div class="column-body" id="col-todo"></div>
    </div>

    <div class="column" data-status="ondeck">
      <div class="column-header">
        <span class="column-title">On Deck</span>
        <span class="count" id="count-ondeck">0</span>
      </div>
      <div class="column-body" id="col-ondeck"></div>
    </div>

    <div class="column" data-status="doing">
      <div class="column-header">
        <span class="column-title">Doing</span>
        <span class="count" id="count-doing">0</span>
      </div>
      <div class="column-body" id="col-doing"></div>
    </div>

    <div class="column" data-status="done">
      <div class="column-header">
        <span class="column-title">Done</span>
        <span class="count" id="count-done">0</span>
        <button id="clearDoneBtn" class="btn btn-icon" title="Clear all done tasks">Clear</button>
      </div>
      <div class="column-body" id="col-done"></div>
    </div>
  </main>

  <!-- Edit Task Modal -->
  <div class="modal-backdrop" id="editModalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h2 id="editModalTitle">Edit Task</h2>
        <button class="modal-close" id="editModalCloseBtn">&times;</button>
      </div>
      <div class="form-grid">
        <div class="field field-wide">
          <label for="editTitle">Task title *</label>
          <input id="editTitle" type="text" />
        </div>
        <div class="field">
          <label for="editPriority">Priority</label>
          <select id="editPriority">
            <option>Critical</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>
        <div class="field">
          <label for="editDueDate">Due date</label>
          <input id="editDueDate" type="date" />
        </div>
        <div class="field">
          <label for="editStatus">Status</label>
          <select id="editStatus">
            <option value="todo">To Do</option>
            <option value="ondeck">On Deck</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="field">
          <label for="editRecurring">Recurring</label>
          <select id="editRecurring">
            <option value="">Not Recurring</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
          <input id="editRecurringInterval" type="number" min="2" max="52" value="1" style="width:60px;display:none;margin-top:4px" title="Every N weeks/months" />
        </div>
        <div class="field field-wide">
          <label class="checkbox-label" for="editAccomplishment">
            <input id="editAccomplishment" type="checkbox" />
            <span>Flag as accomplishment (include in status reports)</span>
          </label>
        </div>
        <div class="field field-wide">
          <label for="editNotes">Notes</label>
          <textarea id="editNotes" rows="3" placeholder="Optional notes"></textarea>
        </div>
        <div class="field field-wide">
          <label>Checklist
            <button type="button" id="addChecklistBtn" class="btn btn-outline btn-tiny" title="Add a checklist step">+ Add step</button>
          </label>
          <div id="editChecklist" class="checklist-editor"></div>
        </div>
      </div>
      <div class="form-actions">
        <button id="editCancelBtn" class="btn btn-outline">Cancel</button>
        <button id="editSaveBtn" class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Accomplishments Report Modal -->
  <div class="modal-backdrop" id="reportModalBackdrop">
    <div class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="reportModalTitle">
      <div class="modal-header">
        <h2 id="reportModalTitle">Accomplishments Report</h2>
        <button class="modal-close" id="reportModalCloseBtn">&times;</button>
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="reportRangePreset">Date range</label>
          <select id="reportRangePreset">
            <option value="week">This week</option>
            <option value="lastweek">Last week</option>
            <option value="month" selected>This month</option>
            <option value="lastmonth">Last month</option>
            <option value="quarter">This quarter</option>
            <option value="ytd">Year to date</option>
            <option value="all">All time</option>
            <option value="custom">Custom…</option>
          </select>
        </div>
        <div class="field">
          <label for="reportScope">Boards</label>
          <select id="reportScope">
            <option value="current">Current board only</option>
            <option value="all" selected>All boards</option>
          </select>
        </div>
        <div class="field">
          <label for="reportStart">From</label>
          <input id="reportStart" type="date" />
        </div>
        <div class="field">
          <label for="reportEnd">To</label>
          <input id="reportEnd" type="date" />
        </div>
        <div class="field field-wide">
          <label for="reportOutput">Report (Markdown — ready to copy/paste)</label>
          <textarea id="reportOutput" rows="14" readonly></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button id="reportCloseBtn" class="btn btn-outline">Close</button>
        <button id="reportCopyBtn" class="btn btn-primary">Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <!-- Login overlay -->
  <div id="loginOverlay">
    <div id="loginCard">
      <h2>Steve's KanBan</h2>
      <p id="loginError" class="login-error" style="display:none"></p>
      <div class="login-field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="login-field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" />
      </div>
      <button id="loginBtn" class="btn btn-primary" style="width:100%">Sign In</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
